<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ポタ電 残電力計算ツール</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: #e5e7eb;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
        }
        .card {
            background: #1f2937;
            border-radius: 16px;
            padding: 16px 18px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.35);
            margin-top: 16px;
        }
        h1 {
            font-size: 1.4rem;
            margin: 0 0 8px;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 12px;
        }
        label {
            font-size: 0.9rem;
            display: block;
            margin-bottom: 6px;
        }
        select, input[type="number"] {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #4b5563;
            background: #111827;
            color: #e5e7eb;
            font-size: 0.95rem;
            box-sizing: border-box;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        .row {
            margin-top: 12px;
        }
        .btn {
            width: 100%;
            margin-top: 14px;
            padding: 11px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #22c55e, #38bdf8);
            color: #0b1120;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .result {
            margin-top: 14px;
            padding: 10px 12px;
            border-radius: 12px;
            background: #030712;
            border: 1px solid #374151;
            font-size: 0.9rem;
        }
        .result-title {
            font-weight: 600;
            margin-bottom: 6px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin: 2px 0;
        }
        .result-label {
            color: #9ca3af;
        }
        .result-value {
            font-weight: 600;
        }
        .small {
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: 6px;
        }
        .footer {
            margin-top: 18px;
            font-size: 0.75rem;
            color: #6b7280;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>ポタ電 残電力計算ツール</h1>
        <div class="subtitle">
            EcoFlow DELTA 2 / RIVER 2 の％表示から<br>
            残り電力(Wh)をざっくり計算します。
        </div>

        <div class="row">
            <label for="model">ポタ電モデル</label>
            <select id="model">
                <option value="DELTA2">EcoFlow DELTA 2 (1024Wh)</option>
                <option value="RIVER2">EcoFlow RIVER 2 (256Wh)</option>
            </select>
        </div>

        <div class="row">
            <label for="percent">本体表示の残量（％）</label>
            <input id="percent" type="number" min="0" max="100" placeholder="例：65">
        </div>

        <div class="row">
            <label for="load">使う家電の消費電力（W）※任意</label>
            <input id="load" type="number" min="0" placeholder="例：60（電気毛布など）">
        </div>

        <button class="btn" onclick="calc()">計算する</button>

        <div id="result" class="result" style="display:none;">
            <div class="result-title">計算結果</div>
            <div class="result-item">
                <span class="result-label">選択モデル</span>
                <span class="result-value" id="rModel"></span>
            </div>
            <div class="result-item">
                <span class="result-label">残量％</span>
                <span class="result-value" id="rPercent"></span>
            </div>
            <div class="result-item">
                <span class="result-label">残り電力</span>
                <span class="result-value" id="rWh"></span>
            </div>
            <div class="result-item" id="timeRow" style="display:none;">
                <span class="result-label">その家電が使える目安時間</span>
                <span class="result-value" id="rTime"></span>
            </div>
            <div class="small">
                ※実際の使用時間は変換ロスや負荷変動で前後します。<br>
                あくまで目安として使ってください。
            </div>
        </div>
    </div>

    <div class="footer">
        © ポタ電残量計算ツール（森田さん用カスタム）
    </div>
</div>

<script>
function getCapacityWh(model) {
    if (model === "DELTA2") return 1024; // EcoFlow DELTA 2
    if (model === "RIVER2") return 256;  // EcoFlow RIVER 2
    return 0;
}

function calc() {
    const model = document.getElementById("model").value;
    const percent = parseFloat(document.getElementById("percent").value);
    const loadW = parseFloat(document.getElementById("load").value);

    if (isNaN(percent) || percent < 0 || percent > 100) {
        alert("残量％は 0〜100 の範囲で入力してください。");
        return;
    }

    const capacity = getCapacityWh(model);
    const remainWh = capacity * (percent / 100);

    document.getElementById("result").style.display = "block";
    document.getElementById("rModel").textContent =
        model === "DELTA2" ? "EcoFlow DELTA 2" : "EcoFlow RIVER 2";
    document.getElementById("rPercent").textContent = percent.toFixed(1) + " %";
    document.getElementById("rWh").textContent = remainWh.toFixed(1) + " Wh";

    if (!isNaN(loadW) && loadW > 0) {
        const hours = remainWh / loadW;
        document.getElementById("timeRow").style.display = "flex";
        document.getElementById("rTime").textContent = hours.toFixed(2) + " 時間";
    } else {
        document.getElementById("timeRow").style.display = "none";
    }
}
</script>
</body>
</html>
